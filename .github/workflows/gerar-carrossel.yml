name: Gerar Carrossel Instagram

on:
  workflow_dispatch:
    inputs:
      numero_post:
        description: 'Número do post (ex: 02)'
        required: true
        default: '02'
  push:
    paths:
      - 'posts/post-**.md'

jobs:
  gerar-carrossel:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install pillow requests

      - name: Detectar número do post
        id: detect_post
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            NUMERO_POST="${{ github.event.inputs.numero_post }}"
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | grep 'posts/post-' | head -1)
            if [ -z "$CHANGED" ]; then
              CHANGED=$(ls -t posts/post-*.md 2>/dev/null | head -1)
            fi
            NUM=$(echo "$CHANGED" | grep -oE '[0-9]+' | tail -1)
            NUMERO_POST=$(printf '%02d' "$NUM")
          fi
          echo "NUMERO_POST=$NUMERO_POST" >> $GITHUB_ENV
          echo "Post detectado: $NUMERO_POST"

      - name: Confirmar prompt do carrossel
        run: |
          PROMPT_FILE="carrossel/post-${NUMERO_POST}-prompt.md"
          if [ -f "$PROMPT_FILE" ]; then
            echo "Prompt do carrossel encontrado: $PROMPT_FILE"
            echo "Copie o conteúdo desse arquivo e cole na IA de geração de imagens."
          else
            echo "Aviso: prompt não encontrado em $PROMPT_FILE"
          fi
